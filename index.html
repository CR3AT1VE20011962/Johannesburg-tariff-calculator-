<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City of Joburg 2026/2027 Tariff Increase Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .header {
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }
        .header-text {
            flex: 1;
        }
        .header h1 {
            margin: 0;
            color: #e53e3e;
            font-size: 24px;
        }
        .header p {
            margin: 5px 0 0 0;
            color: #718096;
            font-size: 14px;
        }
        .logo-container {
            flex-shrink: 0;
            background-color: #333; /* Dark background to make the white "CRA" text clearly visible */
            padding: 10px 15px;
            border-radius: 6px;
        }
        .logo-container img {
            height: 45px;
            display: block;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #2d3748;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .currency {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #a0aec0;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px 10px 10px 30px;
            font-size: 16px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            border-color: #ed8936;
        }
        .grid-2 {
            display: table;
            width: 100%;
            table-layout: fixed;
        }
        .grid-col {
            display: table-cell;
            width: 50%;
            vertical-align: top;
        }
        .grid-col:first-child {
            padding-right: 15px;
        }
        .grid-col:last-child {
            padding-left: 15px;
        }
        .results-box {
            background-color: #f7fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 20px;
            margin-top: 25px;
        }
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .results-table th, .results-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }
        .results-table th {
            color: #4a5568;
            font-weight: 600;
        }
        .results-table td {
            color: #2d3748;
        }
        .total-row {
            background-color: #fff5f5;
            font-weight: bold;
            font-size: 16px;
            color: #e53e3e !important;
        }
        .total-row-vat {
            background-color: #fffaf0;
            font-weight: bold;
            font-size: 18px;
            color: #dd6b20 !important;
        }
        .badge {
            display: inline-block;
            padding: 2px 6px;
            background: #feebc8;
            border-radius: 4px;
            font-size: 12px;
            color: #dd6b20;
            font-weight: 600;
        }
    </style>
</head>
