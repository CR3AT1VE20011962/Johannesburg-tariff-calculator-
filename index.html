<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City of Joburg 2026/2027 Tariff Increase Calculator</title>

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #fff0eb;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(255, 69, 0, 0.15);
            overflow: hidden;
        }
        .header-bg {

            text-align: center;
        }
        .header-bg img {
            max-width: 180px;
            margin-bottom: 15px;
            display: inline-block;
        }
        .header h1 {
            margin: 0;
            color: #ffffff;
            font-size: 26px;
            letter-spacing: 0.5px;
        }
        .header p {
            margin: 10px 0 0 0;
            color: #ffeee6;
            font-size: 15px;
        }
        .content-body {
            padding: 30px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #cc0000;
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper .currency {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff6600;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px 10px 10px 30px;
            font-size: 16px;
            border: 2px solid #ffd1b3;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: #ff4500;
            box-shadow: 0 0 5px rgba(255, 69, 0, 0.3);
        }
        .grid-2 {
            display: table;
            width: 100%;
            table-layout: fixed;
        }
        .grid-col {
            display: table-cell;
            width: 50%;
            vertical-align: top;
        }
        .grid-col:first-child {
            padding-right: 15px;
        }
        .grid-col:last-child {
            padding-left: 15px;
        }
